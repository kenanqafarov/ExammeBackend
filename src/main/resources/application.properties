spring.application.name=examme

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Swagger / OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-match=/api/**
springdoc.packages-to-scan=com.examme.examme.controller
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.displayRequestDuration=true

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/examme_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Nuray28032006!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Disable Flyway migrations temporarily when MySQL detection fails locally
spring.flyway.enabled=false

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.examme.examme=DEBUG

# JWT Configuration
app.jwtSecret=ExammeSecretKeyThatIsVeryLongAndComplexForSecurityPurposesAnd256BitsLength
app.jwtExpirationMs=86400000

# Gemini API Configuration
gemini.api.key=AIzaSyAVkxuA4jjZr0TzwSxV7lOqOXN3i9rfGV8

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Application Configuration
app.name=Smart Quiz Platform
app.version=1.0.0
